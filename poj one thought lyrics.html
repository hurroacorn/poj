<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light dark">
<title>One Thought · 一念</title>
<style>
  :root{
    color-scheme:light dark;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  /* LIGHT (default) */
  :root, html[data-theme="light"]{
    --bg:#fbfaf7;
    --card:#fbfaf7;
    --ink:#1a1a1a;
    --pinyin:#8a6d3b;
    --en:#5b6470;
    --rule:#e8e4da;
    --accent:#7c3a2d;
    --bar-bg:rgba(251,250,247,0.92);
    --chip-off:#efece4;
    --chip-off-ink:#9a958a;
    --chip-on:#7c3a2d;
    --chip-on-ink:#ffffff;
    --end:#b9b3a6;
  }
  /* DARK via OS */
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --bg:#121110;
      --card:#121110;
      --ink:#ece7dd;
      --pinyin:#c9a86a;
      --en:#9aa2ad;
      --rule:#2a2724;
      --accent:#e0956f;
      --bar-bg:rgba(18,17,16,0.9);
      --chip-off:#26231f;
      --chip-off-ink:#7d766b;
      --chip-on:#e0956f;
      --chip-on-ink:#1a1512;
      --end:#4a4640;
    }
  }
  /* DARK via manual override */
  html[data-theme="dark"]{
    --bg:#121110;
    --card:#121110;
    --ink:#ece7dd;
    --pinyin:#c9a86a;
    --en:#9aa2ad;
    --rule:#2a2724;
    --accent:#e0956f;
    --bar-bg:rgba(18,17,16,0.9);
    --chip-off:#26231f;
    --chip-off-ink:#7d766b;
    --chip-on:#e0956f;
    --chip-on-ink:#1a1512;
    --end:#4a4640;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Heiti SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    line-height:1.4;
    padding-bottom:calc(24px + var(--safe-b));
    transition:background .2s,color .2s;
  }

  .bar{
    position:sticky;top:0;z-index:10;
    background:var(--bar-bg);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    backdrop-filter:saturate(180%) blur(12px);
    padding:calc(10px + var(--safe-t)) 16px 10px;
    border-bottom:1px solid var(--rule);
  }
  .titlerow{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:10px;margin-bottom:9px;
  }
  .title{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--accent);}
  .title .sub{font-size:11px;font-weight:400;color:var(--en);display:block;margin-top:1px;}
  .theme-btn{
    flex:none;font-size:16px;line-height:1;
    padding:8px 10px;border-radius:9px;border:1px solid var(--rule);
    background:var(--chip-off);color:var(--chip-off-ink);cursor:pointer;
  }
  .toggles{display:flex;gap:8px;}
  .chip{
    flex:1;font-size:13px;font-weight:600;
    padding:9px 6px;border-radius:10px;border:none;
    background:var(--chip-on);color:var(--chip-on-ink);
    transition:background .15s,color .15s;cursor:pointer;
  }
  .chip[aria-pressed="false"]{background:var(--chip-off);color:var(--chip-off-ink);}

  main{padding:18px 16px 0;max-width:520px;margin:0 auto;}
  .stanza{margin-bottom:22px;}
  .line{padding:2px 0;}
  .zh{font-size:21px;font-weight:500;letter-spacing:.01em;line-height:1.5;color:var(--ink);}
  .py{font-size:14px;color:var(--pinyin);font-style:italic;line-height:1.45;margin-top:1px;}
  .en{font-size:14px;color:var(--en);line-height:1.4;margin-top:2px;}
  body.hide-py .py{display:none;}
  body.hide-en .en{display:none;}
  body.hide-zh .zh{display:none;}

  .end{text-align:center;color:var(--end);font-size:12px;padding:8px 0 4px;letter-spacing:.15em;}
</style>
</head>
<body>
  <div class="bar">
    <div class="titlerow">
      <div class="title">One Thought<span class="sub">一念 · 逐玉 OST</span></div>
      <button class="theme-btn" id="theme" aria-label="Toggle light or dark">🌓</button>
    </div>
    <div class="toggles">
      <button class="chip" id="t-zh" aria-pressed="true">中文</button>
      <button class="chip" id="t-py" aria-pressed="true">Pinyin</button>
      <button class="chip" id="t-en" aria-pressed="true">English</button>
      <button class="chip" id="t-script" aria-pressed="true">简</button>
    </div>
  </div>

  <main id="lyrics"></main>
  <div class="end">· 终 ·</div>

<script>
// each line: [simplified, traditional, pinyin, english]
const data = [
  [
    ["一生风雨 片刻花期","一生風雨 片刻花期","Yī shēng fēng yǔ, piànkè huā qī","A lifetime of storms, for a fleeting season of bloom"],
    ["极尽芳华成诗 为一场相遇","極盡芳華成詩 為一場相遇","Jí jìn fāng huá chéng shī, wèi yī chǎng xiāng yù","All my radiant years turned into poetry, for the sake of one encounter"]
  ],
  [
    ["一纸相思半世离","一紙相思半世離","Yī zhǐ xiāng sī, bàn shì lí","A page of longing, half a lifetime of separation"],
    ["燃尽痴狂为你 为一眼灵犀","燃盡痴狂為你 為一眼靈犀","Rán jìn chī kuáng wèi nǐ, wèi yī yǎn líng xī","Burning away all my madness for you, for that one knowing glance"]
  ],
  [
    ["这一生","這一生","Zhè yī shēng","In this lifetime"],
    ["目所及 耳所栖","目所及 耳所棲","Mù suǒ jí, ěr suǒ qī","All that my eyes see and ears rest upon"],
    ["生死相抵","生死相抵","Shēng sǐ xiāng dǐ","Is worth life and death itself"]
  ],
  [
    ["这一程","這一程","Zhè yī chéng","On this journey"],
    ["心所系 皆是你","心所系 皆是你","Xīn suǒ xì, jiē shì nǐ","All that my heart is bound to is you"],
    ["魂牵又梦系","魂牽又夢系","Hún qiān yòu mèng xì","My soul is drawn to you, my dreams tied to you"]
  ],
  [
    ["这一别","這一別","Zhè yī bié","In this parting"],
    ["情所钟 爱所惧","情所鍾 愛所懼","Qíng suǒ zhōng, ài suǒ jù","Love is my deepest desire, love is my greatest fear"],
    ["一念成疾","一念成疾","Yī niàn chéng jí","One lingering thought becomes an illness"]
  ],
  [
    ["我欲与你同归去","我欲與你同歸去","Wǒ yù yǔ nǐ tóng guī qù","I wish to return with you"],
    ["生死不离","生死不離","Shēng sǐ bù lí","Never parting, in life or in death"]
  ]
];

const root = document.getElementById('lyrics');
data.forEach(stanza=>{
  const s=document.createElement('div');
  s.className='stanza';
  stanza.forEach(([zhS,zhT,py,en])=>{
    const l=document.createElement('div');
    l.className='line';
    const dz=document.createElement('div');
    dz.className='zh';
    dz.dataset.simplified=zhS;
    dz.dataset.traditional=zhT;
    dz.textContent=zhS;
    const dp=document.createElement('div'); dp.className='py'; dp.textContent=py;
    const de=document.createElement('div'); de.className='en'; de.textContent=en;
    l.appendChild(dz); l.appendChild(dp); l.appendChild(de);
    s.appendChild(l);
  });
  root.appendChild(s);
});

function wire(id,cls){
  const btn=document.getElementById(id);
  btn.addEventListener('click',()=>{
    const on=btn.getAttribute('aria-pressed')==='true';
    btn.setAttribute('aria-pressed',String(!on));
    document.body.classList.toggle(cls,on);
  });
}
wire('t-zh','hide-zh');
wire('t-py','hide-py');
wire('t-en','hide-en');

// simplified/traditional script toggle (pressed = simplified, unpressed = traditional)
const scriptBtn=document.getElementById('t-script');
scriptBtn.addEventListener('click',()=>{
  const simplified=scriptBtn.getAttribute('aria-pressed')==='true';
  const next=!simplified;
  scriptBtn.setAttribute('aria-pressed',String(next));
  scriptBtn.textContent = next ? '简' : '繁';
  document.querySelectorAll('.zh').forEach(el=>{
    el.textContent = next ? el.dataset.simplified : el.dataset.traditional;
  });
});

// theme override: cycles auto -> light -> dark -> auto
const tbtn=document.getElementById('theme');
const states=[null,'light','dark'];
let idx=0;
tbtn.addEventListener('click',()=>{
  idx=(idx+1)%3;
  const v=states[idx];
  if(v===null){ document.documentElement.removeAttribute('data-theme'); tbtn.textContent='🌓'; }
  else if(v==='light'){ document.documentElement.setAttribute('data-theme','light'); tbtn.textContent='☀️'; }
  else { document.documentElement.setAttribute('data-theme','dark'); tbtn.textContent='🌙'; }
});
</script>
</body>
</html>
