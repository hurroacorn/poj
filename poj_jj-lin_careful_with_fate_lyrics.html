<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light dark">
<title>Careful with Fate · 我对缘分小心翼翼</title>
<style>
  :root{
    color-scheme:light dark;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  /* LIGHT (default) */
  :root, html[data-theme="light"]{
    --bg:#fbfaf7;
    --card:#fbfaf7;
    --ink:#1a1a1a;
    --pinyin:#8a6d3b;
    --en:#5b6470;
    --rule:#e8e4da;
    --accent:#7c3a2d;
    --bar-bg:rgba(251,250,247,0.92);
    --chip-off:#efece4;
    --chip-off-ink:#9a958a;
    --chip-on:#7c3a2d;
    --chip-on-ink:#ffffff;
    --end:#b9b3a6;
  }
  /* DARK via OS */
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --bg:#121110;
      --card:#121110;
      --ink:#ece7dd;
      --pinyin:#c9a86a;
      --en:#9aa2ad;
      --rule:#2a2724;
      --accent:#e0956f;
      --bar-bg:rgba(18,17,16,0.9);
      --chip-off:#26231f;
      --chip-off-ink:#7d766b;
      --chip-on:#e0956f;
      --chip-on-ink:#1a1512;
      --end:#4a4640;
    }
  }
  /* DARK via manual override */
  html[data-theme="dark"]{
    --bg:#121110;
    --card:#121110;
    --ink:#ece7dd;
    --pinyin:#c9a86a;
    --en:#9aa2ad;
    --rule:#2a2724;
    --accent:#e0956f;
    --bar-bg:rgba(18,17,16,0.9);
    --chip-off:#26231f;
    --chip-off-ink:#7d766b;
    --chip-on:#e0956f;
    --chip-on-ink:#1a1512;
    --end:#4a4640;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Heiti SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    line-height:1.4;
    padding-bottom:calc(24px + var(--safe-b));
    transition:background .2s,color .2s;
  }

  .bar{
    position:sticky;top:0;z-index:10;
    background:var(--bar-bg);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    backdrop-filter:saturate(180%) blur(12px);
    padding:calc(10px + var(--safe-t)) 16px 10px;
    border-bottom:1px solid var(--rule);
  }
  .titlerow{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:10px;margin-bottom:9px;
  }
  .title{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--accent);}
  .title .sub{font-size:11px;font-weight:400;color:var(--en);display:block;margin-top:1px;}
  .theme-btn{
    flex:none;font-size:16px;line-height:1;
    padding:8px 10px;border-radius:9px;border:1px solid var(--rule);
    background:var(--chip-off);color:var(--chip-off-ink);cursor:pointer;
  }
  .toggles{display:flex;gap:8px;}
  .chip{
    flex:1;font-size:13px;font-weight:600;
    padding:9px 6px;border-radius:10px;border:none;
    background:var(--chip-on);color:var(--chip-on-ink);
    transition:background .15s,color .15s;cursor:pointer;
  }
  .chip[aria-pressed="false"]{background:var(--chip-off);color:var(--chip-off-ink);}

  main{padding:18px 16px 0;max-width:520px;margin:0 auto;}
  .stanza{margin-bottom:22px;}
  .line{padding:2px 0;}
  .zh{font-size:21px;font-weight:500;letter-spacing:.01em;line-height:1.5;color:var(--ink);}
  .py{font-size:14px;color:var(--pinyin);font-style:italic;line-height:1.45;margin-top:1px;}
  .en{font-size:14px;color:var(--en);line-height:1.4;margin-top:2px;}
  body.hide-py .py{display:none;}
  body.hide-en .en{display:none;}
  body.hide-zh .zh{display:none;}

  .end{text-align:center;color:var(--end);font-size:12px;padding:8px 0 4px;letter-spacing:.15em;}
</style>
</head>
<body>
  <div class="bar">
    <div class="titlerow">
      <div class="title">Careful with Fate<span class="sub">我对缘分小心翼翼 · JJ Lin (林俊杰) · 逐玉 OST</span></div>
      <button class="theme-btn" id="theme" aria-label="Toggle light or dark">🌓</button>
    </div>
    <div class="toggles">
      <button class="chip" id="t-zh" aria-pressed="true">中文</button>
      <button class="chip" id="t-py" aria-pressed="true">Pinyin</button>
      <button class="chip" id="t-en" aria-pressed="true">English</button>
    </div>
  </div>

  <main id="lyrics"></main>
  <div class="end">· 终 ·</div>

<script>
const data = [
  [
    ["乱世马蹄 谁还留在风雪里","Luànshì mǎtí shuí hái liú zài fēngxuě lǐ","In chaotic times with galloping warhorses, who still remains in the wind and snow?"],
    ["多少人在命悬一线的距离","Duōshǎo rén zài mìng xuán yīxiàn de jùlí","How many are on the brink of death?"],
    ["而家园硝烟起 谁能遗世独立","Ér jiāyuán xiāoyān qǐ shuí néng yíshì dúlì","As smoke from war rises from our homeland, who can remain untouched by the world?"],
    ["夕阳隐去 我无语 yeah","Xīyáng yǐn qù wǒ wúyǔ yeah","The sunset fades, and I am left speechless."]
  ],
  [
    ["秋色落地 谁轻踩 枫叶而去","Qiūsè luòdì shuí qīng cǎi fēngyè ér qù","Autumn falls, who lightly steps over maple leaves and walks away?"],
    ["梧桐细雨 檐下春燕 衔着泥","Wútóng xìyǔ yánxià chūnyàn xiánzhe ní","In the fine rain by the parasol trees, swallows under the eaves carry mud in their beaks."],
    ["这古镇的烟火气 为谁不期而遇","Zhè gǔzhèn de yānhuǒ qì wèi shuí bùqī ér yù","In this ancient town's vibrant atmosphere, who meets by chance?"]
  ],
  [
    ["许下生死相依 愿誓言如期","Xǔxià shēngsǐ xiāngyī yuàn shìyán rúqī","We vow to stand by each other in life and death, hoping our promise holds true."]
  ],
  [
    ["我对 缘分小心翼翼 不放弃","Wǒ duì yuánfèn xiǎoxīn yìyì bù fàngqì","I treat fate with care, never giving up."],
    ["无奈 烽火马蹄扰乱了结局","Wúnài fēnghuǒ mǎtí rǎoluàn le jiéjú","But helplessly, war and galloping hooves disrupt our ending."]
  ],
  [
    ["红尘 来去断断续续","Hóngchén láiqù duànduàn xùxù","In this mortal world, arrivals and departures come in fragments."],
    ["你转身蹙着眉挥剑离去","Nǐ zhuǎnshēn cùzhe méi huī jiàn líqù","You turn away, frowning, and leave with a swing of your sword."],
    ["也带走所有秘密","Yě dàizǒu suǒyǒu mìmì","Taking all the secrets with you."]
  ],
  [
    ["我对 缘分小心翼翼 不放弃","Wǒ duì yuánfèn xiǎoxīn yìyì bù fàngqì","I treat fate with care, never giving up."],
    ["我们 却总在沙场里 烽火相遇","Wǒmen què zǒng zài shāchǎng lǐ fēnghuǒ xiāngyù","Yet we always meet again on battlefields amid flames of war"],
    ["宿命 纠缠中你给的 回忆温润如玉","Sùmìng jiūchán zhōng nǐ gěi de huíyì wēnrùn rú yù","Entangled by fate, the memories you gave are warm and smooth like jade"],
    ["经历 无数次的战役","Jīnglì wúshù cì de zhànyì","After experiencing countless battles"],
    ["如愿 回到初识之地","Rúyuàn huídào chūshí zhī dì","We finally return to where we first met."]
  ],
  [
    ["雨落地 庙堂谁叹息","Yǔ luò dì miàotáng shuí tànxī","Rain falls to the ground, who sighs within the temple halls?"],
    ["等风起 天子守大义","Děng fēng qǐ tiānzǐ shǒu dàyì","Waiting for the wind to rise, the emperor upholds great righteousness."],
    ["这世事岂 能尽人意","Zhè shìshì qǐ néng jìn rén yì","How can worldly affairs ever go as one wishes?"],
    ["语道尽 而你我却不离","Yǔ dào jìn ér nǐ wǒ què bù lí","Words may be exhausted, yet you and I remain inseparable."]
  ],
  [
    ["风飘零 爱怎么证明","Fēng piāolíng ài zěnme zhèngmíng","As the wind scatters, how can love be proven?"],
    ["雨打萍 选择去相信","Yǔ dǎ píng xuǎnzé qù xiāngxìn","Like rain striking duckweed, we choose to believe."],
    ["走过边境 语气更坚定","Zǒuguò biānjìng yǔqì gèng jiāndìng","Crossing borders, our voices grow more resolute."],
    ["彼此信守 我们的初心 woo","Bǐcǐ xìnshǒu wǒmen de chūxīn woo","We hold fast to our original promise together."]
  ],
  [
    ["我对 缘分小心翼翼 不放弃","Wǒ duì yuánfèn xiǎoxīn yìyì bù fàngqì","I treat fate with care and never give up."],
    ["无奈 烽火马蹄扰乱 了结局","Wúnài fēnghuǒ mǎtí rǎoluàn le jiéjú","But helplessly, war and galloping hooves disrupt our ending."],
    ["天涯 何处能遮风雨 何处能够在一起","Tiānyá héchù néng zhē fēngyǔ héchù nénggòu zài yìqǐ","At the edge of the world, where can we shelter from the storm? Where can we be together?"],
    ["心平静 聆听 远方横笛你 在哪里","Xīn píngjìng língtīng yuǎnfāng héngdí nǐ zài nǎlǐ","With a calm heart, I listen to the distant flute, where are you?"]
  ],
  [
    ["我对 缘分小心翼翼 不放弃","Wǒ duì yuánfèn xiǎoxīn yìyì bù fàngqì","I treat fate with care, never giving up."],
    ["我们 却总在沙场里 烽火相遇 yeah~","Wǒmen què zǒng zài shāchǎng lǐ fēnghuǒ xiāngyù yeah","Yet we always meet on battlefields amid flames of war"],
    ["知道 前方狂风骤雨 也迎面走过去","Zhīdào qiánfāng kuángfēng zhòuyǔ yě yíngmiàn zǒu guòqù","Knowing fierce storms lie ahead, we face them head-on"],
    ["我们 坚持收复失地","Wǒmen jiānchí shōufù shīdì","We persist in reclaiming lost ground,"],
    ["无惧 敌人的来袭","Wújù dírén de láixí","unafraid of the enemy's attack."],
    ["来袭","Láixí","Their assault."]
  ]
];

const root = document.getElementById('lyrics');
data.forEach(stanza=>{
  const s=document.createElement('div');
  s.className='stanza';
  stanza.forEach(([zh,py,en])=>{
    const l=document.createElement('div');
    l.className='line';
    const dz=document.createElement('div'); dz.className='zh'; dz.textContent=zh;
    const dp=document.createElement('div'); dp.className='py'; dp.textContent=py;
    const de=document.createElement('div'); de.className='en'; de.textContent=en;
    l.appendChild(dz); l.appendChild(dp); l.appendChild(de);
    s.appendChild(l);
  });
  root.appendChild(s);
});

function wire(id,cls){
  const btn=document.getElementById(id);
  btn.addEventListener('click',()=>{
    const on=btn.getAttribute('aria-pressed')==='true';
    btn.setAttribute('aria-pressed',String(!on));
    document.body.classList.toggle(cls,on);
  });
}
wire('t-zh','hide-zh');
wire('t-py','hide-py');
wire('t-en','hide-en');

// theme override: cycles auto -> light -> dark -> auto
const tbtn=document.getElementById('theme');
const states=[null,'light','dark'];
let idx=0;
tbtn.addEventListener('click',()=>{
  idx=(idx+1)%3;
  const v=states[idx];
  if(v===null){ document.documentElement.removeAttribute('data-theme'); tbtn.textContent='🌓'; }
  else if(v==='light'){ document.documentElement.setAttribute('data-theme','light'); tbtn.textContent='☀️'; }
  else { document.documentElement.setAttribute('data-theme','dark'); tbtn.textContent='🌙'; }
});
</script>
</body>
</html>
