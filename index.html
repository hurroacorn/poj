<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light dark">
<title>逐玉 OST Lyrics</title>
<style>
  :root{
    color-scheme:light dark;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  :root, html[data-theme="light"]{
    --bg:#fbfaf7; --card:#fbfaf7; --ink:#1a1a1a;
    --pinyin:#8a6d3b; --en:#5b6470; --rule:#e8e4da; --accent:#7c3a2d;
    --bar-bg:rgba(251,250,247,0.92);
    --chip-off:#efece4; --chip-off-ink:#9a958a;
    --chip-on:#7c3a2d; --chip-on-ink:#ffffff; --end:#b9b3a6;
  }
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --bg:#121110; --card:#121110; --ink:#ece7dd;
      --pinyin:#c9a86a; --en:#9aa2ad; --rule:#2a2724; --accent:#e0956f;
      --bar-bg:rgba(18,17,16,0.9);
      --chip-off:#26231f; --chip-off-ink:#7d766b;
      --chip-on:#e0956f; --chip-on-ink:#1a1512; --end:#4a4640;
    }
  }
  html[data-theme="dark"]{
    --bg:#121110; --card:#121110; --ink:#ece7dd;
    --pinyin:#c9a86a; --en:#9aa2ad; --rule:#2a2724; --accent:#e0956f;
    --bar-bg:rgba(18,17,16,0.9);
    --chip-off:#26231f; --chip-off-ink:#7d766b;
    --chip-on:#e0956f; --chip-on-ink:#1a1512; --end:#4a4640;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Heiti SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    line-height:1.4;
    padding-bottom:calc(24px + var(--safe-b));
    transition:background .2s,color .2s;
  }

  .bar{
    position:sticky;top:0;z-index:10;
    background:var(--bar-bg);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    backdrop-filter:saturate(180%) blur(12px);
    padding:calc(10px + var(--safe-t)) 16px 10px;
    border-bottom:1px solid var(--rule);
  }
  .titlerow{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:10px;margin-bottom:9px;
  }
  .title{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--accent);}
  .title .sub{font-size:11px;font-weight:400;color:var(--en);display:block;margin-top:1px;}
  .theme-btn{
    flex:none;font-size:16px;line-height:1;
    padding:8px 10px;border-radius:9px;border:1px solid var(--rule);
    background:var(--chip-off);color:var(--chip-off-ink);cursor:pointer;
  }

  .songrow{margin-bottom:8px;}
  select#song{
    width:100%;font-size:14px;font-weight:600;
    padding:10px 12px;border-radius:10px;border:1px solid var(--rule);
    background:var(--chip-off);color:var(--ink);
    -webkit-appearance:none;appearance:none;
  }

  .toggles{display:flex;gap:8px;}
  .chip{
    flex:1;font-size:13px;font-weight:600;
    padding:9px 6px;border-radius:10px;border:none;
    background:var(--chip-on);color:var(--chip-on-ink);
    transition:background .15s,color .15s;cursor:pointer;
  }
  .chip[aria-pressed="false"]{background:var(--chip-off);color:var(--chip-off-ink);}
  .chip[hidden]{display:none;}

  main{padding:18px 16px 0;max-width:520px;margin:0 auto;}
  .stanza{margin-bottom:22px;}
  .line{padding:2px 0;}
  .zh{font-size:21px;font-weight:500;letter-spacing:.01em;line-height:1.5;color:var(--ink);}
  .py{font-size:14px;color:var(--pinyin);font-style:italic;line-height:1.45;margin-top:1px;}
  .en{font-size:14px;color:var(--en);line-height:1.4;margin-top:2px;}
  body.hide-py .py{display:none;}
  body.hide-en .en{display:none;}
  body.hide-zh .zh{display:none;}

  .end{text-align:center;color:var(--end);font-size:12px;padding:8px 0 4px;letter-spacing:.15em;}
</style>
</head>
<body>
  <div class="bar">
    <div class="titlerow">
      <div class="title" id="title-main">One Thought<span class="sub" id="title-sub">一念 · 逐玉 OST</span></div>
      <button class="theme-btn" id="theme" aria-label="Toggle light or dark">🌓</button>
    </div>
    <div class="songrow">
      <select id="song" aria-label="Choose song">
        <option value="yinian">一念 · One Thought</option>
        <option value="xiaoxin">我对缘分小心翼翼 · Careful with Fate</option>
      </select>
    </div>
    <div class="toggles">
      <button class="chip" id="t-zh" aria-pressed="true">中文</button>
      <button class="chip" id="t-py" aria-pressed="true">Pinyin</button>
      <button class="chip" id="t-en" aria-pressed="true">English</button>
      <button class="chip" id="t-script" aria-pressed="true">简</button>
    </div>
  </div>

  <main id="lyrics"></main>
  <div class="end">· 终 ·</div>

<script>

      ],
      [
        ["红尘 来去断断续续","紅塵 來去斷斷續續","Hóngchén láiqù duànduàn xùxù","In this mortal world, arrivals and departures come in fragments."],
        ["你转身蹙着眉挥剑离去","你轉身蹙著眉揮劍離去","Nǐ zhuǎnshēn cùzhe méi huī jiàn líqù","You turn away, frowning, and leave with a swing of your sword."],

        ["宿命 纠缠中你给的 回忆温润如玉","宿命 糾纏中妳給的 回憶溫潤如玉","Sùmìng jiūchán zhōng nǐ gěi de huíyì wēnrùn rú yù","Entangled by fate, the memories you gave are warm and smooth like jade"],

        ["等风起 天子守大义","等風起 天子守大義","Děng fēng qǐ tiānzǐ shǒu dàyì","Waiting for the wind to rise, the emperor upholds great righteousness."],
        ["这世事岂 能尽人意","這世事豈 能盡人意","Zhè shìshì qǐ néng jìn rén yì","How can worldly affairs ever go as one wishes?"],

      ],

        ["风飘零 爱怎么证明","風飄零 愛怎麼證明","Fēng piāolíng ài zěnme zhèngmíng","As the wind scatters, how can love be proven?"],
        ["雨打萍 选择去相信","雨打萍 選擇去相信","Yǔ dǎ píng xuǎnzé qù xiāngxìn","Like rain striking duckweed, we choose to believe."],
        ["走过边境 语气更坚定","走過邊境 語氣更堅定","Zǒuguò biānjìng yǔqì gèng jiāndìng","Crossing borders, our voices grow more resolute."],
        ["彼此信守 我们的初心 woo","彼此信守 我們的初心 Woo","Bǐcǐ xìnshǒu wǒmen de chūxīn woo","We hold fast to our original promise together."]

        ["我们 坚持收复失地","我們 堅持收復失地","Wǒmen jiānchí shōufù shīdì","We persist in reclaiming lost ground,"],

const root = document.getElementById('lyrics');
const scriptBtn = document.getElementById('t-script');
let currentSong = 'yinian';
let showSimplified = true; // true=简, false=繁

function render(){
  const song = SONGS[currentSong];
  document.getElementById('title-main').textContent = song.title;
  document.getElementById('title-sub').textContent = ''; // reset before appending
  document.getElementById('title-main').innerHTML = song.title + '<span class="sub">' + song.sub + '</span>';

  // script toggle only meaningful when the song has traditional data
  scriptBtn.hidden = !song.hasTraditional;

  root.innerHTML = '';
  song.stanzas.forEach(stanza=>{
    const s=document.createElement('div');
    s.className='stanza';
    stanza.forEach(([zhS,zhT,py,en])=>{
      const l=document.createElement('div');
      l.className='line';
      const dz=document.createElement('div');
      dz.className='zh';
      const useTrad = song.hasTraditional && !showSimplified && zhT;
      dz.textContent = useTrad ? zhT : zhS;
      const dp=document.createElement('div'); dp.className='py'; dp.textContent=py;
      const de=document.createElement('div'); de.className='en'; de.textContent=en;
      l.appendChild(dz); l.appendChild(dp); l.appendChild(de);
      s.appendChild(l);
    });
    root.appendChild(s);
  });
}

document.getElementById('song').addEventListener('change', (e)=>{
  currentSong = e.target.value;
  render();
});

function wire(id,cls){
  const btn=document.getElementById(id);
  btn.addEventListener('click',()=>{
    const on=btn.getAttribute('aria-pressed')==='true';
    btn.setAttribute('aria-pressed',String(!on));
    document.body.classList.toggle(cls,on);
  });
}
wire('t-zh','hide-zh');
wire('t-py','hide-py');
wire('t-en','hide-en');

scriptBtn.addEventListener('click',()=>{
  showSimplified = !showSimplified;
  scriptBtn.setAttribute('aria-pressed', String(showSimplified));
  scriptBtn.textContent = showSimplified ? '简' : '繁';
  render();
});

const tbtn=document.getElementById('theme');
const states=[null,'light','dark'];
let idx=0;
tbtn.addEventListener('click',()=>{
  idx=(idx+1)%3;
  const v=states[idx];
  if(v===null){ document.documentElement.removeAttribute('data-theme'); tbtn.textContent='🌓'; }
  else if(v==='light'){ document.documentElement.setAttribute('data-theme','light'); tbtn.textContent='☀️'; }
  else { document.documentElement.setAttribute('data-theme','dark'); tbtn.textContent='🌙'; }
});

render();
</script>
</body>
</html>
